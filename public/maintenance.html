<!doctype html>
<html lang="ja">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="robots" content="noindex" />
	<title>準備中 | sj-wao</title>
	<style>
		:root {
			--accent: #2337ff;
			--gray-dark: 34, 41, 57;
			--gray: 96, 115, 159;
		}
		* {
			box-sizing: border-box;
		}
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
			background: #fff;
			color: rgb(var(--gray-dark));
			text-align: center;
			padding: 1.5em;
		}
		main {
			max-width: 480px;
		}
		h1 {
			font-size: 1.75em;
			margin: 0 0 0.5em;
			color: var(--accent);
		}
		p {
			font-size: 1.1em;
			line-height: 1.6;
			color: rgba(var(--gray), 1);
			margin: 0;
		}
	</style>
</head>
<body>
	<main>
		<h1>ただいま準備中です</h1>
		<p>コンテンツを整えています。もうしばらくお待ちください。</p>
	</main>
</body>
</html>
